<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台中租屋監控</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "PingFang TC", sans-serif; background: #F5F4F0; padding: 1rem; }
.debug { background: #1a1a1a; color: #00ff00; padding: 1rem; border-radius: 8px; font-family: monospace; font-size: 13px; margin-bottom: 1rem; white-space: pre-wrap; word-break: break-all; }
.card { background: #fff; border-radius: 12px; padding: 1rem; margin-bottom: 10px; border: 1px solid #eae8e3; }
.btn { padding: 8px 16px; background: #185FA5; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>
<h2 style="margin-bottom:1rem">台中租屋監控 - 除錯模式</h2>
<button class="btn" onclick="test()">測試連線</button>
<div id="debug" class="debug" style="margin-top:1rem">按「測試連線」開始...</div>
<div id="results"></div>

<script>
const URL1 = "https://zqjcgzfajnxsglrmvfcm.supabase.co";
const KEY1 = "sb_publishable_Z3MLHcGq52qawsGMxeKfsA_gtOV7bZz";
const KEY2 = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxamNnemZham54c2dscm12ZmNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTE1MzYsImV4cCI6MjA5MjU4NzUzNn0.aiMCx7kozCJLNEBd56hZiivZCoy3RDaqR6LjSqSqDYQ";

function log(msg) {
  document.getElementById('debug').textContent += '\n' + msg;
}

async function test() {
  document.getElementById('debug').textContent = '開始測試...\n';
  
  // 測試1: publishable key
  log('=== 測試 publishable key ===');
  try {
    const r1 = await fetch(`${URL1}/rest/v1/properties?select=id,district&limit=3`, {
      headers: { 'apikey': KEY1, 'Authorization': `Bearer ${KEY1}` }
    });
    log(`狀態碼: ${r1.status}`);
    const t1 = await r1.text();
    log(`回應: ${t1.substring(0,300)}`);
  } catch(e) {
    log(`錯誤: ${e.message}`);
  }

  // 測試2: anon key (eyJ)
  log('\n=== 測試 anon key (eyJ) ===');
  try {
    const r2 = await fetch(`${URL1}/rest/v1/properties?select=id,district&limit=3`, {
      headers: { 'apikey': KEY2, 'Authorization': `Bearer ${KEY2}` }
    });
    log(`狀態碼: ${r2.status}`);
    const t2 = await r2.text();
    log(`回應: ${t2.substring(0,300)}`);
  } catch(e) {
    log(`錯誤: ${e.message}`);
  }

  // 測試3: 不帶任何 key
  log('\n=== 測試無 key ===');
  try {
    const r3 = await fetch(`${URL1}/rest/v1/properties?select=id&limit=1`);
    log(`狀態碼: ${r3.status}`);
    const t3 = await r3.text();
    log(`回應: ${t3.substring(0,200)}`);
  } catch(e) {
    log(`錯誤: ${e.message}`);
  }
  
  log('\n=== 完成 ===');
}
</script>
</body>
</html>
